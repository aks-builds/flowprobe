name: Release
on:
  push:
    branches: ['__never__']
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options: [patch, minor, major, prerelease]
jobs:
  release:
    runs-on: ubuntu-latest
    permissions: { contents: write, pull-requests: write }
    steps:
      - uses: actions/checkout@v4
        with: { token: '${{ secrets.APPROVER_PAT }}' }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Bump version + roll CHANGELOG
        run: |
          npm version ${{ github.event.inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [$VERSION] - $(date +%F)/" CHANGELOG.md
          git config user.name "aks-builds"
          git config user.email "aks-builds@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore: release v$VERSION"
          git push origin HEAD:release/v$VERSION
      - name: Open PR
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh pr create --base master --head release/v$VERSION \
            --title "Release v$VERSION" --body "Automated release PR" \
            --label release
        env: { GH_TOKEN: '${{ secrets.APPROVER_PAT }}' }
