[package]
name = "flowprobe-desktop"
version = "0.1.0"
description = "FlowProbe — event-driven system testing"
authors = ["aks-builds"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "flowprobe_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[features]
# Enable the Tauri custom-protocol feature for release builds so the app
# serves the bundled frontend instead of the dev server URL.
custom-protocol = ["tauri/custom-protocol"]
e2e-mock = []

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
tauri-plugin-updater = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["time", "rt", "rt-multi-thread"] }

